<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% feed_meta %}
  {% seo %}
</head>
<body>
  <header class="site-header">
    <nav class="site-nav">
      <a href="/thebossmind/" class="site-title">{{ site.title }}</a>
      <ul class="nav-links">
        <li><a href="/thebossmind/categories/">Categories</a></li>
        <li><a href="/thebossmind/tags/">Tags</a></li>
        <li><a href="/thebossmind/archive/">Archive</a></li>
      </ul>
    </nav>
  </header>

  <main class="site-content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}. All rights reserved.</p>
  </footer>
</body>
</html>
